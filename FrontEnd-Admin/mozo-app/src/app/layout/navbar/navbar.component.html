<!-- Navbar -->
<nav class="navbar w-full bg-base-300">

  <!-- IZQUIERDA -->
  <div class="flex items-center">
    <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost">
      <ng-icon name="lucidePanelRightOpen" class="text-2xl text-primary" />
    </label>
    <div class="px-4">Navbar Title</div>
  </div>


  <mz-modal-control name="login-page" #loginModal>
    <mz-login-page [data]="loginModal.data$()" />
  </mz-modal-control>


  <div class="ml-auto flex gap-2">
    @if(user$ | async; as user){
    <div class="dropdown dropdown-end">
      <div tabindex="0" class="btn btn-sm btn-ghost">
        {{ user.noUsuario }}
      </div>

      <ul tabindex="0" class="dropdown-content menu bg-base-200 rounded-box w-40 p-2 shadow">
        <li><a (click)="logout()">Logout</a></li>
      </ul>
    </div>
    }
    @else {
    <a (click)="openLogin()" class="btn btn-active">
      Login
    </a>
    }
  </div>




</nav>

<!-- Page content here -->
<div class="p-4">
  <router-outlet />
</div>
