<div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-bold">Mantenimiento de Empresas</h1>

  <mz-button-control type="submit" [view]="MenuControlTypeEnum.New" (click)="onMenuAction('insert', null)" />
</div>


<mz-generic-grid 
    [items]="empresas()"
    [columnas]="3"
    [mostrarBordes]="true"
    [espaciado]="2"
    [bordeGrosor]="1"
    bordeColor="border-primary/10"
    redondeado="xl"
    [sombra]="true"
    [hover]="true"
    bgColor="bg-base-100">

    <ng-template #itemTemplate let-empresa let-i="index">
      <div class="p-2">
        <!-- Header del item -->
        <div class="flex justify-between items-start mb-2">
          <div class="flex items-center gap-1">
            <span class="badge badge-ghost font-mono">ID: {{empresa.coEmpresa}}</span>
            <mz-state-control [state]="empresa.flEstReg == 1 ? 1 : 0" />  
            <span class="text-lg font-bold text-base-content">{{ empresa.noEmpresa }}</span> 
          </div>
          <mz-menu-control [items]="menuItems" [state]="empresa.flEstReg ?? null" (action)="onMenuAction($event, empresa)" />
        </div>
        <!-- Contenido -->
        <div class="space-y-2">
          <span class="text-base-content">  {{ empresa.noEmpresaCorto }}</span>
          <div class="divider my-1"></div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-base-content/60 font-semibold">Módulos</span>
                {{ getModulosTexto(empresa.coEmpresa!) }}
          </div>
        </div>
      </div>
    </ng-template>
  </mz-generic-grid>

<mz-pagination-control [page]="pageIndex()" [totalPages]="pageCount" (change)="goToPage($event)">
</mz-pagination-control>

<mz-modal-control name="empresa-form-page" #empresaModal>
  <mz-empresa-form-page (saved)="onSaved(empresaModal.data$())" [data]="empresaModal.data$()" />
</mz-modal-control>
