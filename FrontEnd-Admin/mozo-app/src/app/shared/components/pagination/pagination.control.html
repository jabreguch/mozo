<div class="join mt-4">

  <button class="join-item btn" (click)="prev()" [disabled]="_page() === 1">
    «
  </button>

  @for (p of pages(); track p) {
  <button
    class="join-item btn"
    [class.btn-active]="p === _page()"
    (click)="goTo(p)">
    {{ p }}
  </button>
  }

  <button class="join-item btn" (click)="next()" [disabled]="_page() === _totalPages()">
    »
  </button>

</div>
